name: Atualizacao Diaria de Dados

on:
  schedule:
    # Roda todos os dias às 03:00 AM (Horário de Brasília seria ~00:00)
    - cron: '0 3 * * *'
  workflow_dispatch: # Permite que você rode manualmente pelo site do GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install requests pandas supabase python-dotenv

      - name: Executar script de atualização
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python update_data.py